# MarkdownLint config for Renault Symbol repair manual
# Rules: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Line length — tables and code blocks may exceed 80 chars
MD013: false
# Inline HTML — allowed for specific formatting
MD033: false
# Code block style — fenced is fine
MD046: false
# Emphasis style — both * and _ are acceptable
MD049: false
# Blanks around lists — too many false positives in tech docs
MD032: false
# Blanks around headings — too many false positives in tech docs
MD022: false
# Multiple top-level headings — SUMMARY.md requires them
MD025: false
# Heading style — ATX headings
MD003:
  style: atx
# Unordered list style — dash preferred
MD004:
  style: dash
# Ordered list prefix — "1/1/1" style
MD029:
  style: ordered
# No hard tabs
MD010: true
# No bare URLs
MD034: true
# Trailing punctuation in headings — allowed (colons in tool lists)
MD026: false
# Blanks around fenced code blocks — relaxed
MD031: false
# Emphasis used instead of heading — allowed in technical text
MD036: false
# SUMMARY.md indent — mdBook specific
MD007:
  indent: 4
