<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450>
  <rect width="700" height="450" fill="#ffffff" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Система охлаждения — циркуляция охлаждающей жидкости</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
  <rect x="250" y="80" width="160" height="80" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="330" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="bold" fill="#c62828">Двигатель
(рубашка охлаждения)</text>
  <rect x="250" y="240" width="160" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="330" y="275" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565c0">Радиатор</text>
  <rect x="460" y="160" width="100" height="50" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="510" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100">Термостат</text>
  <text x="510" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#e65100">(открыт/закрыт)</text>
  <rect x="460" y="80" width="100" height="50" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="510" y="105" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Водяной насос</text>
  <rect x="80" y="80" width="100" height="50" rx="6" fill="#fce4ec" stroke="#ad1457" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#ad1457">Расширительный
бачок</text>
  <rect x="80" y="240" width="100" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="130" y="265" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="bold" fill="#6a1b9a">Отопитель салона</text>
  <line x1="410" y1="100" x2="460" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="90" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#c62828">горячая</text>
  <line x1="510" y1="210" x2="510" y2="238" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="238" x2="410" y2="238" stroke="#666" stroke-width="2"/>
  <line x1="410" y1="238" x2="330" y2="238" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#1565c0">большой круг</text>
  <line x1="330" y1="320" x2="330" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="240" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#1565c0">охлаждённая</text>
  <line x1="250" y1="110" x2="180" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#6a1b9a">отопление</text>
  <line x1="130" y1="290" x2="130" y2="330" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="330" x2="330" y2="330" stroke="#666" stroke-width="2"/>
  <line x1="330" y1="330" x2="330" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="130" x2="130" y2="180" stroke="#ad1457" stroke-width="1"/>
  <line x1="130" y1="180" x2="250" y2="180" stroke="#ad1457" stroke-width="1"/>
  <line x1="250" y1="180" x2="250" y2="160" stroke="#ad1457" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="185" y="175" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#ad1457">компенсация</text>
  <line x1="510" y1="160" x2="510" y2="145" stroke="#e65100" stroke-width="2"/>
  <line x1="510" y1="145" x2="460" y2="145" stroke="#e65100" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="570" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#e65100">малый круг
(термостат закрыт)</text>
</svg>
