  <text x="340" y="25" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="normal" fill="#333">Клемма (−)</text>
  <rect x="220" y="115" width="25" height="90" rx="4" fill="#e3f2fd" stroke="#90a4ae" stroke-width="2"/>
  <rect x="250" y="115" width="25" height="90" rx="4" fill="#e3f2fd" stroke="#90a4ae" stroke-width="2"/>
