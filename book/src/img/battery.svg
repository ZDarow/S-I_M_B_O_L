<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350>
  <rect width="600" height="350" fill="#ffffff" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Аккумуляторная батарея — устройство и обслуживание</text>
  <rect x="200" y="60" width="200" height="160" rx="15" fill="#e8eaf6" stroke="#283593" stroke-width="2"/>
  <rect x="210" y="70" width="180" height="30" rx="6" fill="#c5cae9" stroke="#283593" stroke-width="2"/>
  <rect x="255" y="40" width="10" height="25" rx="3" fill="#c62828" stroke="none" stroke-width="2"/>
