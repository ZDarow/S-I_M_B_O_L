(H₂SO₄)</text>
  <rect x="225" y="155" width="2" height="40" rx="6" fill="#999" stroke="#1565c0" stroke-width="2"/>
  <rect x="235" y="155" width="2" height="40" rx="6" fill="#999" stroke="#1565c0" stroke-width="2"/>
  <text x="245" y="175" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="normal" fill="#666">пластины
(Pb/PbO₂)</text>
  <text x="70" y="280" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="normal" fill="#333">Напряжение: 12 В</text>
  <text x="70" y="298" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="normal" fill="#333">Ёмкость: 45–70 А·ч</text>
  <text x="70" y="316" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="normal" fill="#333">Пусковой ток: 300–600 А</text>
  <text x="70" y="334" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="normal" fill="#333">Полярность: прямая / обратная</text>
  <text x="70" y="352" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="normal" fill="#333">Срок службы: 4–5 лет</text>
