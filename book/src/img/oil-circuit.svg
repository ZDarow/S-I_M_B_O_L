  <rect x="180" y="105" width="140" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="250" y="135" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="normal" fill="#1565c0">Масляный насос</text>
  <rect x="330" y="105" width="140" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
