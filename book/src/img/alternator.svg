<circle cx="120" cy="155" r="25" fill="none" stroke="#666" stroke-width="4"/><circle cx="120" cy="155" r="8" fill="#666"/>  <text x="120" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="normal" fill="#666">Шкив привода</text>
