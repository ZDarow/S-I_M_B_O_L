<circle cx="275" cy="155" r="50" fill="none" stroke="#1565c0" stroke-width="4"/>  <text x="275" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1565c0">Статор (обмотка)</text>
