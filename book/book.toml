[book]
title = "Руководство по ремонту Renault Symbol"
authors = ["mi"]
description = "Технический справочник-руководство по ремонту и эксплуатации Renault Symbol (Thalia). Двигатели K7J, K4J, K7M, K4M, K9K — характеристики, диагностика, обслуживание."
language = "ru"
src = "src"

[output.html]
no-section-label = true
git-repository-url = "https://github.com/ZDarow/S-I_M_B_O_L"
default-theme = "light"
preferred-dark-theme = "coal"
site-url = "https://zdarow.github.io/S-I_M_B_O_L/"
additional-css = ["./theme/admonitions.css", "./theme/css/renault.css"]

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 15
use-boolean-and = true

[output.html.playground]
runnable = false

[output.pdf]
chrome = "chromium"
no-sandbox = true
optional = true
additional-css = ["./theme/pdf.css"]
cover-image = "./src/img/1-22.jpg"
