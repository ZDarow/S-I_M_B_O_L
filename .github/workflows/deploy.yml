# GitHub Actions: автосборка и деплой mdBook на GitHub Pages
name: Deploy mdBook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook and mdbook-pdf
        run: |
          curl -fsSL https://github.com/rust-lang/mdBook/releases/latest/download/mdbook-x86_64-unknown-linux-gnu.tar.gz \
            | tar xzf - -C /usr/local/bin
          cargo install mdbook-pdf --locked

      - name: Setup Chromium for PDF
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends chromium

      - name: Build book (HTML + PDF)
        run: mdbook build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book/html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: reno-symbol-pdf
          path: book/book/pdf/output.pdf

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
