---
# GitHub Actions: автосборка и деплой mdBook на GitHub Pages
name: Deploy mdBook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown
        run: |
          markdownlint 'book/src/**/*.md' \
            --disable MD013 MD033 MD046 \
            --ignore 'book/book' \
          || echo "markdownlint warnings (non-blocking)"

      - name: Spellcheck (hunspell)
        run: |
          sudo apt-get install -y --no-install-recommends hunspell hunspell-ru
          echo "Проверка орфографии (первые 10 страниц)..."
          for f in $(find book/src -name '*.md' ! -name 'SUMMARY.md' | head -10); do
            echo "--- $f ---"
            hunspell -d ru_RU -l "$f" | sort -u | head -10 || true
          done

      - name: Check trailing whitespace
        run: |
          if grep -rn '[[:space:]]$' book/src/ --include='*.md'; then
            echo "⚠️  Trailing whitespace found in files above"
          else
            echo "✅ No trailing whitespace"
          fi

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          # mdBook
          curl -fsSL https://github.com/rust-lang/mdBook/releases/latest/download/mdbook-x86_64-unknown-linux-gnu.tar.gz \
            | tar xzf - -C /usr/local/bin

          # mdbook-pdf (pre-built binary, v0.1.13)
          curl -fsSL https://github.com/HollowMan6/mdbook-pdf/releases/download/v0.1.13/mdbook-pdf-v0.1.13-x86_64-unknown-linux-gnu \
            -o /usr/local/bin/mdbook-pdf && chmod +x /usr/local/bin/mdbook-pdf

          # mermaid-cli
          npm install -g @mermaid-js/mermaid-cli --ignore-engines

      - name: Setup Chromium
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends chromium

      - name: Install Python deps
        run: pip3 install pikepdf

      - name: Cache Mermaid SVGs
        uses: actions/cache@v4
        with:
          path: book/src/img/mermaid
          key: mermaid-${{ hashFiles('book/src/**/*.md') }}
          restore-keys: |
            mermaid-

      - name: Build book
        run: |
          export PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
          python3 scripts/mermaid-preprocess.py --render-only
          python3 scripts/mermaid-preprocess.py
          mdbook build book
          python3 scripts/mermaid-preprocess.py --restore

      - name: Post-process PDF
        run: python3 scripts/pdf-a4.py

      - name: Post-process (sitemap, 404)
        run: |
          python3 scripts/sitemap.py --source book/book/html || echo "sitemap skipped"
          cp scripts/404.html book/book/html/404.html 2>/dev/null || echo "404 copy skipped"
          cp book/book/pdf/output.pdf book/book/html/reno-symbol.pdf 2>/dev/null || true

      - name: Check internal links (lychee)
        uses: lycheeverse/lychee-action@v1
        with:
          args: --include-fragments --no-progress --scheme=https --scheme=http './book/book/html/**/*.html'
          fail: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book/html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: reno-symbol-pdf
          path: book/book/pdf/output.pdf

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
