# GitHub Actions: автосборка и деплой mdBook на GitHub Pages
name: Deploy mdBook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown
        run: |
          markdownlint 'book/src/**/*.md' \
            --disable MD013 MD033 MD046 \
            --ignore 'book/book' \
          || echo "markdownlint warnings (non-blocking)"

      - name: Spellcheck (hunspell)
        run: |
          sudo apt-get install -y --no-install-recommends hunspell hunspell-ru
          echo "Проверка орфографии..."
          for f in $(find book/src -name '*.md' | head -5); do
            hunspell -d ru_RU -l "$f" | sort -u | head -20 || true
          done

      - name: Install mdBook and mdbook-pdf
        run: |
          curl -fsSL https://github.com/rust-lang/mdBook/releases/latest/download/mdbook-x86_64-unknown-linux-gnu.tar.gz \
            | tar xzf - -C /usr/local/bin
          cargo install mdbook-pdf --locked

      - name: Setup Chromium for PDF
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends chromium

      - name: Build book (HTML + PDF)
        run: mdbook build book

      - name: Check internal links (lychee)
        uses: lycheeverse/lychee-action@v1
        with:
          args: --include-fragments --no-progress --scheme=https --scheme=http './book/book/html/**/*.html'
          fail: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book/html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: reno-symbol-pdf
          path: book/book/pdf/output.pdf

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
